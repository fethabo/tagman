name: Publish to NPM
on:
  # Te permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Se ejecuta cuando creás un Release formal en GitHub
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      
      - run: pnpm install
      - run: pnpm run build
      
      # Solo publica si el build es exitoso
      - run: pnpm publish --provenance --no-git-checks